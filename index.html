<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light;
        --boot-bg: #fff;
        --boot-text: #151717;
        --boot-accent: #046ebc;

        /* Page theme variables — consumed by fonts.css body rule.
           Must be defined here so body{background-color:var(--color-bg)}
           resolves immediately instead of falling back to transparent. */
        --color-bg: #fff;
        --color-text: #151717;
      }

      html {
        background: var(--boot-bg);
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--boot-bg);
        color: var(--boot-text);
      }

      #root {
        min-height: 100vh;
      }

      .app-boot {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at top, rgba(4, 110, 188, 0.12), transparent 45%),
          linear-gradient(180deg, #f7f6f2 0%, #f3f1eb 100%);
      }

      .app-boot__mark {
        width: 3.2rem;
        height: 3.2rem;
        border: 0.28rem solid rgba(21, 23, 23, 0.12);
        border-top-color: var(--boot-accent);
        border-radius: 999px;
        animation: app-boot-spin 0.8s linear infinite;
      }

      @keyframes app-boot-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>

    <!-- Preload fonts -->
    <link rel="preload" href="/src/fonts/instrument-sans.woff2" as="font" crossorigin="" type="font/woff2" />
    <link rel="preload" href="/src/fonts/lora.woff2" as="font" crossorigin="" type="font/woff2" />

    <!-- Dashboard fonts & icons -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <!-- Preload hero image -->
    <link rel="preload" as="image" href="/src/images/house.webp" />

    <!-- SEO -->
    <title>VCR Builders and Developers</title>
    <meta name="description" content="Karnataka's most thoughtful layout developers. Premium plots, gated communities, Vastu-compliant." />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#046ebc" />

    <!-- PWA: iOS support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VCR" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <meta property="og:title" content="VCR Builders and Developers | Premium Plots in Karnataka" />
    <meta property="og:description" content="Karnataka's most thoughtful layout developers. Premium plots, gated communities, Vastu-compliant." />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="/pwa-icon-512.png" type="image/png" />
</head>

<body class="__variable_3d9088 __variable_c1a059">
    <div id="root">
      <div class="app-boot" aria-hidden="true">
        <div class="app-boot__mark"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      const isLocalDevHost =
        location.hostname === 'localhost' ||
        location.hostname === '127.0.0.1'
      const isAdminPath =
        location.pathname === '/admin' ||
        location.pathname.startsWith('/admin/')

      if ('serviceWorker' in navigator && !isLocalDevHost && isAdminPath) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js', { scope: '/admin' })
        })
      }
    </script>
</body>

</html>
